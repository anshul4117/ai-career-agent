<svg viewBox="0 0 360 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .brand-title {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 28px;
      fill: #ffffff;
    }
    .brand-tagline {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 10px;
      fill: #ffffff;
      letter-spacing: 2px;
      opacity: 0.8;
    }
  </style>

  <!-- Icon Group -->
  <g transform="translate(10, 0)">
    <!-- Connection Lines -->
    <line x1="44" y1="42" x2="34" y2="48" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="44" y1="62" x2="34" y2="48" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="34" y1="48" x2="26" y2="32" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="34" y1="48" x2="14" y2="48" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="34" y1="48" x2="20" y2="66" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="26" y1="32" x2="14" y2="48" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="14" y1="48" x2="20" y2="66" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="20" y1="66" x2="32" y2="76" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
    <line x1="32" y1="76" x2="44" y2="66" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />

    <!-- Nodes -->
    <circle cx="26" cy="32" r="5.5" fill="#ffffff" stroke="#ffffff" stroke-width="2.5" />
    <circle cx="14" cy="48" r="5.5" fill="#ffffff" stroke="#ffffff" stroke-width="2.5" />
    <circle cx="20" cy="66" r="5.5" fill="#ffffff" stroke="#ffffff" stroke-width="2.5" />
    <circle cx="32" cy="76" r="5.5" fill="#ffffff" stroke="#ffffff" stroke-width="2.5" />
    <circle cx="34" cy="48" r="5" fill="#ffffff" stroke="#ffffff" stroke-width="2.5" />

    <!-- Briefcase Outlines -->
    <path d="M 66 32 V 24 C 66 22.9 66.9 22 68 22 H 82 C 83.1 22 84 22.9 84 24 V 32" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 64 32 H 100 C 103.3 32 106 34.7 106 38 V 52" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
    <path d="M 106 50 V 66 C 106 69.3 103.3 72 100 72 H 74" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
    <path d="M 76 72 H 50 C 46.7 72 44 69.3 44 66 V 52" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
    <path d="M 44 54 V 38 C 44 34.7 46.7 32 50 32 H 66" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />

    <!-- Magnifying Glass -->
    <circle cx="75" cy="49" r="9" stroke="#ffffff" stroke-width="5.5" fill="none" />
    <line x1="81.5" y1="55.5" x2="93" y2="67" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" />
  </g>

  <!-- Text Group -->
  <text x="140" y="50" class="brand-title">AI Career Agent</text>
  <text x="140" y="68" class="brand-tagline">CAREER OPERATING SYSTEM</text>
</svg>
