name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Validate Codebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js (Latest LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify Environment
        run: |
          echo "=== System Environment Verification ==="
          echo "Node.js version: $(node -v)"
          echo "npm version: $(npm -v)"
          echo "Current working directory: $(pwd)"
          echo "Prerequisites verified successfully."

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.{js,jsx,ts,tsx,css,md,json}

      - name: Verify formatting (Prettier) on changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: npx prettier --check ${{ steps.changed-files.outputs.all_changed_files }}

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript compiler check
        run: npm run type-check

      - name: Run Production Build
        run: npm run build
